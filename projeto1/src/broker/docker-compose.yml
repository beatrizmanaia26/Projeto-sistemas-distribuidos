services:

  broker:
    build:
      context: .
      dockerfile: Dockerfile.py
    image: broker-pyzmq:latest
    container_name: broker
    volumes:
      - ./broker.py:/app/main.py
    ports:
      - "5555:5555"
      - "5556:5556"

  proxy:
    image: broker-pyzmq:latest
    container_name: proxy
    volumes:
      - ../proxy/proxy.py:/app/main.py
    ports:
      - "5557:5557"
      - "5558:5558"
    depends_on:
      - broker

  coordinator:
    image: broker-java:latest
    container_name: coordinator
    ports:
      - "5559:5559"
    volumes:
      - ./Coordinator.java:/app/Coordinator.java
      - ./Message.java:/app/Message.java
      - ./Response.java:/app/Response.java
      - ./MessagePackUtil.java:/app/MessagePackUtil.java
      - ./ServerRecord.java:/app/ServerRecord.java
    depends_on:
      - broker
    command: sh -c "javac -cp '/app/lib/*' /app/*.java && java -cp '/app:/app/lib/*' Coordinator"

  # PYTHON - Desabilitado (falta implementar eleição)
