  servidorJava1:
    build:
      context: .
      dockerfile: Dockerfile.java
    image: broker-java:latest
    container_name: servidorJava1
    volumes:
      - ./servidor.java:/app/servidor.java
      - ./Message.java:/app/Message.java
      - ./Response.java:/app/Response.java
      - ./MessagePackUtil.java:/app/MessagePackUtil.java
      - ./PublicationRecord.java:/app/PublicationRecord.java
      - ./data_java1:/app/data:rw
      - ./ServerRecord.java:/app/ServerRecord.java
    ports:
      - "6001:6001"
    depends_on:
      - broker
      - proxy
      - coordinator
    command: sh -c "rm -f /app/*.class && javac -cp '/app/lib/*' /app/*.java && java -cp '/app:/app/lib/*' servidor 6001"

  servidorJava2:
    image: broker-java:latest
    container_name: servidorJava2
    volumes:
      - ./servidor.java:/app/servidor.java
      - ./Message.java:/app/Message.java
      - ./Response.java:/app/Response.java
      - ./MessagePackUtil.java:/app/MessagePackUtil.java
      - ./PublicationRecord.java:/app/PublicationRecord.java
      - ./data_java2:/app/data:rw
      - ./ServerRecord.java:/app/ServerRecord.java
    ports:
      - "6002:6002"
    depends_on:
      - broker
      - proxy
      - coordinator
      - servidorJava1
    command: sh -c "rm -f /app/*.class && javac -cp '/app/lib/*' /app/*.java && java -cp '/app:/app/lib/*' servidor 6002"

