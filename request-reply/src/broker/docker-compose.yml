services:

  broker:
    build:
      context: .
      dockerfile: Dockerfile.py
    image: broker-pyzmq:latest 
    container_name: broker
    volumes:
      - ./broker.py:/app/main.py
    ports:
      - "5555:5555"
      - "5556:5556"

  servidorPython:
    image: broker-pyzmq:latest #retirei o build dockerfile e imge pq todos os containers python usam a mesma img base, cria 1x no broker e reusa
    volumes:
      - ./servidor.py:/app/main.py
      - ./data_python:/app/data
    depends_on:
      - broker

  clientePython:
    image: broker-pyzmq:latest
    volumes:
      - ./cliente.py:/app/main.py
    depends_on:
      - broker

  servidorJava:
    build:
      context: .
      dockerfile: Dockerfile.java
    image: broker-java:latest
    volumes:
      - ./servidor.java:/app/servidor.java
      - ./Message.java:/app/Message.java
      - ./Response.java:/app/Response.java
      - ./MessagePackUtil.java:/app/MessagePackUtil.java
      - ./data_java:/app/data:rw
    depends_on:
      - broker
      #Java precisa que o nome do arquivo corresponda ao nome da classe. Com o comando explícito, cada container compila e executa a classe correta.
    command: sh -c "javac -cp '/app/lib/*' /app/*.java && java -cp '/app:/app/lib/*' servidor"

  clienteJava:
    image: broker-java:latest
    volumes:
      - ./cliente.java:/app/cliente.java
      - ./Message.java:/app/Message.java
      - ./Response.java:/app/Response.java
      - ./MessagePackUtil.java:/app/MessagePackUtil.java
    depends_on:
      - broker
    command: sh -c "javac -cp '/app/lib/*' /app/*.java && java -cp '/app:/app/lib/*' cliente"